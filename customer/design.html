<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom order tool</title>
</head>

<body>
  <h2 class="sr-only">Blossombs ontwerptool — personaliseer je product met logo en tekst</h2>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
      </div>

      <div class="side-section">
        <div class="side-label">Toevoegen</div>
        <button class="tool-btn" id="btn-logo"><i class="ti ti-upload" aria-hidden="true"></i> + Logo uploaden</button>
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <div class="text-input-row" style="margin-bottom:6px">
          <input type="text" id="text-input" placeholder="Jouw tekst..." value="Blossombs">
        </div>
        <button class="tool-btn" id="btn-text"><i class="ti ti-text-size" aria-hidden="true"></i> + Tekst
          toevoegen</button>
      </div>

      <div class="side-section">
        <div class="side-label">Kleur</div>
        <div class="color-row" id="color-swatches"></div>
        <div class="prop-row">
          <label>Grootte</label>
          <input type="range" id="font-size" min="10" max="60" value="20" step="1">
          <span id="font-size-out">20</span>
        </div>
        <div class="prop-row">
          <label>Transparantie</label>
          <input type="range" id="opacity" min="10" max="100" value="100" step="1">
          <span id="opacity-out">100%</span>
        </div>
      </div>

      <div class="side-section" style="margin-top:auto; border-top: 0.5px solid var(--color-border-tertiary);">
        <button class="export-btn" id="btn-export"><i class="ti ti-download" aria-hidden="true"></i> Exporteren
          (PNG)</button>
      </div>
    </div>

    <div id="canvas-area">
      <div id="canvas-toolbar">
        <button class="tb-btn" id="btn-delete"><i class="ti ti-trash" aria-hidden="true"></i> Verwijder</button>
        <button class="tb-btn" id="btn-front"><i class="ti ti-arrow-up" aria-hidden="true"></i> Voorgrond</button>
        <button class="tb-btn" id="btn-back"><i class="ti ti-arrow-down" aria-hidden="true"></i> Achtergrond</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="btn-undo"><i class="ti ti-arrow-back-up" aria-hidden="true"></i> Ongedaan</button>
        <button class="tb-btn" id="btn-clear"><i class="ti ti-refresh" aria-hidden="true"></i> Reset</button>
      </div>
      <div id="canvas-wrap">
        <div id="margin-warning"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Object buiten marge!</div>
        <canvas id="c"></canvas>
      </div>
      <div id="status">Selecteer een element om te bewerken • Klik en sleep om te verplaatsen</div>
    </div>
  </div>

  <link rel="stylesheet" href="../shared/css/style.css">
  <script src="../shared/js/fabric.min.js"></script>
  <script src="../shared/js/tool.js"></script>
</body>

</html>
