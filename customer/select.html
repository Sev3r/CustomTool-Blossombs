<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select</title>
</head>

<body>
    <div id="product-list">
        <script>
            fetch('../shared/data/products.json')
                .then(r => r.json())
                .then(products => {
                    products.forEach(product => {
                        const btn = document.createElement('button');
                        btn.textContent = product.label;
                        btn.addEventListener('click', () => {
                            // Sla keuze op en stuur door
                            localStorage.setItem('selectedProduct', JSON.stringify(product));
                            window.location.href = 'design.html'; // jouw tussenpagina
                        });
                        document.getElementById('product-list').appendChild(btn);
                    });
                });
        </script>
    </div>
</body>

</html>
