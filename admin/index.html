<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Blossombs Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="product-preview.css">
</head>

<body>

  <!-- SIDEBAR NAV -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../shared/images/Blos-logo.webp" alt="Blossombs logo" id="brand-logo">
    </div>

    <nav class="sidebar-nav">
      <a href="#sales" class="nav-item" data-page="sales">
        <span class="nav-icon"></span>
        <span>Sales</span>
        <span class="nav-badge" id="badge-sales"></span>
      </a>

      <a href="#creation" class="nav-item" data-page="creation">
        <span class="nav-icon"></span>
        <span>Creatie</span>
        <span class="nav-badge urgent" id="badge-creation"></span>
      </a>

      <a href="#archive" class="nav-item" data-page="archive">
        <span class="nav-icon"></span>
        <span>Archief</span>
        <span class="nav-badge" id="badge-archive"></span>
      </a>

      <a href="#products" class="nav-item" data-page="products">
        <span class="nav-icon"></span>
        <span>Producten</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="reset-btn" id="btn-reset-data" type="button" title="Reset demo data">
        ↺ Reset data
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="page-sales" class="page"></div>
    <div id="page-creation" class="page"></div>
    <div id="page-archive" class="page"></div>
    <div id="page-products" class="page"></div>
  </main>

  <!-- MODAL CONTAINER -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">Modal</h2>

        <button class="modal-close" id="btn-modal-close" type="button" aria-label="Modal sluiten">
          ✕
        </button>
      </div>

      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="dataService.js"></script>
  <script src="../shared/js/offertePdf.js"></script>
  <script src="orders.js"></script>
  <script src="../shared/js/printSpecs.js"></script>
  <script src="../shared/js/productPreview.js"></script>
  <script src="products.js"></script>
  <script src="admin.js"></script>
</body>

</html>
