<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blossombs Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- SIDEBAR NAV -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">🌸</span>
      <div>
        <div class="brand-name">Blossombs</div>
        <div class="brand-sub">Admin</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#orders"   class="nav-item" data-page="orders">
        <span class="nav-icon">📋</span>
        <span>Orders</span>
        <span class="nav-badge" id="badge-orders"></span>
      </a>
      <a href="#products" class="nav-item" data-page="products">
        <span class="nav-icon">📦</span>
        <span>Producten</span>
      </a>
      <a href="#work"     class="nav-item" data-page="work">
        <span class="nav-icon">🛠️</span>
        <span>Werkvoorraad</span>
        <span class="nav-badge urgent" id="badge-work"></span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="reset-btn" id="btn-reset-data" title="Reset demo data">↺ Reset data</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="page-orders"   class="page"></div>
    <div id="page-products" class="page"></div>
    <div id="page-work"     class="page"></div>
  </main>

  <!-- MODAL CONTAINER -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">Modal</h2>
        <button class="modal-close" id="btn-modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="dataService.js"></script>
  <script src="orders.js"></script>
  <script src="products.js"></script>
  <script src="work.js"></script>
  <script src="admin.js"></script>
</body>
</html>
